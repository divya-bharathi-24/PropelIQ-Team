<div class="insurance-step">
  <h3>Insurance Information</h3>

  <form [formGroup]="insuranceForm" class="insurance-form">
    <mat-form-field appearance="outline">
      <mat-label>Insurance Provider</mat-label>
      <input matInput formControlName="insuranceProvider" placeholder="e.g. BlueCross" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Policy Number</mat-label>
      <input matInput formControlName="policyNumber" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Group Number</mat-label>
      <input matInput formControlName="groupNumber" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Member ID</mat-label>
      <input matInput formControlName="memberId" />
    </mat-form-field>
  </form>

  <div class="actions">
    <button mat-stroked-button (click)="toggleSecondary()">
      {{ showSecondary ? 'Remove' : 'Add' }} Secondary Insurance
    </button>
    <button mat-raised-button color="primary"
      [disabled]="insuranceForm.invalid || loading"
      (click)="checkEligibility()">
      @if (loading) {
        <mat-spinner diameter="20"></mat-spinner>
      } @else {
        Verify Coverage
      }
    </button>
  </div>

  @if (coverageResult) {
    <app-coverage-display [coverage]="coverageResult"></app-coverage-display>
  }
</div>
