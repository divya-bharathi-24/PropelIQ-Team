      context: ./src/backend
      dockerfile: Services/Intake/HealthPlatform.Intake.Api/Dockerfile
    ports:
      - "5030:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__IntakeDb=Host=postgres;Database=healthplatform;Username=healthplatform;Password=devpassword;Search Path=clinical_intelligence
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  document-service:
    build:
      context: ./src/backend
