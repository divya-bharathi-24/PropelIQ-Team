      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DocumentDb=Host=postgres;Database=healthplatform;Username=healthplatform;Password=devpassword;Search Path=document
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  clinical-service:
    build:
      context: ./src/backend
      dockerfile: Services/ClinicalIntelligence/HealthPlatform.ClinicalIntelligence.Api/Dockerfile
    ports:
