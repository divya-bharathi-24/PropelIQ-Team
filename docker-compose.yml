    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__ClinicalDb=Host=postgres;Database=healthplatform;Username=healthplatform;Password=devpassword;Search Path=clinical_intelligence
    depends_on:
